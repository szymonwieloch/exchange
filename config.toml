# Exchange Matching Engine — Sample Configuration
# Copy this file and tweak to suit your deployment.

[logging]
# Log severity: "debug", "info", "warn", or "error"
level = "info"
# Path to the output log file (will be overwritten on each run)
file  = "exchange.log"

[engine]

[threading]
# CPU core to pin the matching engine thread to.
# Set to -1 (or omit) for no pinning.
engine_core = 0
# CPU core to pin the logger background thread to.
# Set to -1 (or omit) for no pinning.
logger_core = 1
# CPU core to pin the FIX response dispatch thread to.
# Set to -1 (or omit / null) for no pinning.
response_thread_core = null

[metrics]
# Set to true to enable the Prometheus metrics HTTP endpoint.
enabled = true
# TCP port for the /metrics HTTP endpoint.
port = 9090
# Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = localhost only).
bind_address = "127.0.0.1"

[fix]
# Set to true to enable the FIX protocol gateway.
enabled = true
# TCP port for FIX client connections.
port = 5001
# Bind address (0.0.0.0 = all interfaces, 127.0.0.1 = localhost only).
bind_address = "0.0.0.0"
# Number of I/O threads for handling FIX sessions (0 = auto).
num_threads = 2
# Expected SenderCompID from connecting clients.
sender_comp_id = "CLIENT"
# Our TargetCompID (exchange identifier).
target_comp_id = "EXCHANGE"
# Heartbeat interval in seconds.
heartbeat_interval = 30
